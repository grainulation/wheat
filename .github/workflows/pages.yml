# .github/workflows/pages.yml — Deploy site/ to GitHub Pages
# Vendors shared grainulation primitives from @grainulation/barn at build time
# so CSP `default-src 'self'` stays strict (no cross-origin asset loads).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (for sync-assets)
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Vendor shared assets (sync-assets)
        run: node node_modules/@grainulation/barn/tools/sync-assets.js --target ./site --verbose

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
