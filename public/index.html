<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wheat — sprint dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0e1a'/><path d='M32,3.84 L18.18,3.84 C8.04,13.98 8.04,45.52 18.18,60.16 L32,60.16' fill='none' stroke='%23fbbf24' stroke-width='1.28' stroke-linecap='round' stroke-linejoin='round'/><text x='32' y='33' text-anchor='middle' dominant-baseline='central' fill='%23fbbf24' font-family='-apple-system,system-ui,sans-serif' font-size='24' font-weight='700'>W</text></svg>">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --bg3: #1e293b;
  --bg4: #334155;
  --fg: #e2e8f0;
  --fg2: #94a3b8;
  --fg3: #64748b;
  --accent: #fbbf24;
  --accent2: #f59e0b;
  --accent-bg: rgba(251, 191, 36, 0.08);
  --accent-border: rgba(251, 191, 36, 0.25);
  --green: #34d399;
  --red: #f87171;
  --blue: #60a5fa;
  --purple: #a78bfa;
  --orange: #fb923c;
  --cyan: #22d3ee;
  --border: #1e293b;
  --radius: 6px;
  --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  line-height: 1.5;
}

/* ── Layout ── */
.app {
  display: grid;
  grid-template-rows: 48px 1fr auto 32px;
  grid-template-columns: 240px 1fr 340px;
  height: 100vh;
}
.toolbar { grid-column: 1 / -1; grid-row: 1; }
.sidebar { grid-row: 2; grid-column: 1; }
.main { grid-row: 2; grid-column: 2; }
.detail { grid-row: 2 / 4; grid-column: 3; }
.statusbar { grid-column: 1 / -1; grid-row: 4; }

/* ── Toolbar ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.brand {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.sprint-question {
  flex: 1;
  color: var(--fg2);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toolbar-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.badge-ready { background: rgba(52, 211, 153, 0.15); color: var(--green); }
.badge-blocked { background: rgba(248, 113, 113, 0.15); color: var(--red); }
.badge-phase { background: var(--accent-bg); color: var(--accent); }
.connection-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.connection-dot.disconnected { background: var(--red); }
.reconnect-banner { position:fixed;top:0;left:0;right:0;z-index:9999;padding:8px 16px;background:#92400e;color:#fbbf24;font-size:12px;text-align:center;transform:translateY(-100%);transition:transform .3s;font-family:system-ui,sans-serif }
.reconnect-banner.visible { transform:translateY(0) }
.reconnect-banner button { background:none;border:1px solid #fbbf24;color:#fbbf24;padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px;margin-inline-start:8px }
.btn-refresh {
  background: none; border: 1px solid var(--border);
  color: var(--fg2); padding: 4px 10px;
  border-radius: var(--radius); cursor: pointer;
  font-family: var(--font); font-size: 11px;
}
.btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

/* ── Sidebar ── */
.sidebar {
  background: var(--bg2);
  border-inline-end: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar-section {
  padding: 0 12px;
  margin-bottom: 16px;
}
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--fg3);
  margin-bottom: 8px;
}
.topic-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  color: var(--fg2);
  transition: background 0.1s;
}
.topic-item:hover { background: var(--bg3); }
.topic-item.active { background: var(--accent-bg); color: var(--accent); }
.topic-item .count {
  margin-inline-start: auto;
  font-size: 10px;
  color: var(--fg3);
  background: var(--bg);
  padding: 1px 6px;
  border-radius: 8px;
}
.topic-item.active .count { background: var(--accent-border); color: var(--accent); }
.evidence-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ev-stated { background: var(--fg3); }
.ev-web { background: var(--blue); }
.ev-documented { background: var(--cyan); }
.ev-tested { background: var(--green); }
.ev-production { background: var(--accent); }

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-chip {
  padding: 3px 8px;
  border-radius: 10px;
  font-size: 10px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: none;
  color: var(--fg2);
  font-family: var(--font);
}
.filter-chip:hover { border-color: var(--fg3); }
.filter-chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ── Main (claims list) ── */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-inline-end: 1px solid var(--border);
}
.claims-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--fg3);
  font-weight: 600;
}
.claims-header .total { color: var(--fg2); }
.claims-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.claim-row {
  display: grid;
  grid-template-columns: 52px 84px 1fr 72px;
  gap: 8px;
  align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid rgba(30, 41, 59, 0.5);
  cursor: pointer;
  transition: background 0.1s;
}
.claim-row:hover { background: var(--bg2); }
.claim-row.active { background: var(--accent-bg); border-inline-start: 2px solid var(--accent); padding-inline-start: 14px; }
.claim-row.conflicted { border-inline-start: 2px solid var(--red); padding-inline-start: 14px; }
.claim-row.superseded { opacity: 0.45; }
.claim-id {
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font);
}
.claim-type-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  text-align: center;
}
.type-constraint { background: rgba(251, 191, 36, 0.15); color: var(--accent); }
.type-factual { background: rgba(96, 165, 250, 0.15); color: var(--blue); }
.type-estimate { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
.type-risk { background: rgba(248, 113, 113, 0.15); color: var(--red); }
.type-recommendation { background: rgba(52, 211, 153, 0.15); color: var(--green); }
.type-feedback { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
.claim-content {
  font-size: 12px;
  color: var(--fg2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.claim-evidence {
  font-size: 10px;
  text-align: end;
  color: var(--fg3);
}

/* ── Detail pane ── */
.detail {
  background: var(--bg2);
  overflow-y: auto;
  padding: 0;
}
.detail-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--fg3);
  font-size: 13px;
  text-align: center;
  padding: 32px;
}
.detail-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-id {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}
.detail-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.detail-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  color: var(--fg3);
}
.detail-body {
  padding: 16px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--fg3);
  margin-bottom: 6px;
}
.detail-content {
  font-size: 13px;
  color: var(--fg);
  line-height: 1.7;
}
.detail-field {
  display: flex;
  gap: 8px;
  font-size: 12px;
  margin-bottom: 4px;
}
.detail-field-label { color: var(--fg3); min-width: 80px; }
.detail-field-value { color: var(--fg2); }
.related-claim {
  display: inline-block;
  padding: 2px 8px;
  margin: 2px;
  border-radius: 4px;
  background: var(--bg3);
  color: var(--accent);
  font-size: 11px;
  cursor: pointer;
  font-family: var(--font);
}
.related-claim:hover { background: var(--accent-bg); }

/* ── Statusbar ── */
.statusbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--fg3);
}
.statusbar .hash { font-family: var(--font); color: var(--fg3); }
.coverage-mini {
  display: flex;
  gap: 3px;
  align-items: center;
}
.coverage-bar {
  width: 40px;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  overflow: hidden;
}
.coverage-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ── A11y ── */
.skip-link{position:absolute;top:-40px;inset-inline-start:0;background:var(--accent);color:#000;padding:8px 16px;z-index:10000;font-size:14px;font-weight:600;transition:top .2s}
.skip-link:focus{top:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
}

/* ── Mobile nav ── */
.mobile-nav {
  display: none;
  grid-column: 1 / -1;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.mobile-nav-bar {
  display: flex;
}
.mobile-tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--fg3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--font);
}
.mobile-tab:hover { color: var(--fg2); }
.mobile-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Compilation panel ── */
.compilation-panel {
  padding: 12px 16px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  grid-column: 2;
  grid-row: 3;
  max-height: 140px;
  overflow-y: auto;
  font-size: 11px;
}
.comp-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  color: var(--fg2);
}
.comp-row .comp-label { color: var(--fg3); min-width: 80px; }
.comp-row .comp-value { color: var(--fg); }
.comp-warning {
  padding: 4px 8px;
  margin-top: 4px;
  background: rgba(251, 191, 36, 0.08);
  border-inline-start: 2px solid var(--accent);
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--fg2);
  font-size: 11px;
}
.comp-conflict {
  padding: 4px 8px;
  margin-top: 4px;
  background: rgba(248, 113, 113, 0.08);
  border-inline-start: 2px solid var(--red);
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--fg2);
  font-size: 11px;
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 48px auto 1fr 32px;
  }
  .mobile-nav { display: block; grid-row: 2; }
  .sidebar { grid-row: 3; grid-column: 1; display: none; }
  .main { grid-row: 3; grid-column: 1; border-inline-end: none; }
  .detail { grid-row: 3; grid-column: 1; display: none; }
  .compilation-panel { display: none; }
  .statusbar { grid-row: 4; }
  .sidebar.mobile-visible,
  .detail.mobile-visible { display: flex; flex-direction: column; }
  .main.mobile-hidden { display: none; }
  .filter-bar { overflow-x: auto; flex-wrap: nowrap; }
  .toolbar .sprint-question { display: none; }
}
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to main content</a>
<div id="live-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
<div class="reconnect-banner" id="reconnectBanner" role="status" aria-live="polite"></div>
<div class="app" id="app">
  <!-- Toolbar -->
  <header class="toolbar" role="banner">
    <span class="brand"><svg width="66" height="44" viewBox="0 0 73 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle"><path d="M22,6 L15.5,6 C9.5,11.5 9.5,26.5 15.5,32 L22,32" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="19" text-anchor="middle" dominant-baseline="central" fill="#fbbf24" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">W</text><text x="32.5" y="19" dominant-baseline="central" fill="#e8ecf1" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="800">heat</text></svg></span>
    <span id="phase-badge" class="toolbar-badge badge-phase"></span>
    <span id="sprint-question" class="sprint-question"></span>
    <span id="status-badge" class="toolbar-badge"></span>
    <span id="claim-count" class="toolbar-badge" style="background:var(--bg3);color:var(--fg2)"></span>
    <button class="btn-refresh" onclick="recompile()">compile</button>
    <span id="connection-dot" class="connection-dot"></span>
  </header>

  <!-- Mobile nav -->
  <nav class="mobile-nav" id="mobile-nav" aria-label="Mobile navigation">
    <div class="mobile-nav-bar">
      <button class="mobile-tab active" data-panel="claims" onclick="switchMobilePanel('claims')">Claims</button>
      <button class="mobile-tab" data-panel="topics" onclick="switchMobilePanel('topics')">Topics</button>
      <button class="mobile-tab" data-panel="detail" onclick="switchMobilePanel('detail')">Detail</button>
    </div>
  </nav>

  <!-- Sidebar: Topics + Sprints -->
  <aside class="sidebar" role="complementary" aria-label="Sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Topics</div>
      <div id="topics-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Evidence Legend</div>
      <div style="padding: 0 10px;">
        <div class="topic-item" style="cursor:default"><span class="evidence-dot ev-stated"></span><span>stated</span></div>
        <div class="topic-item" style="cursor:default"><span class="evidence-dot ev-web"></span><span>web</span></div>
        <div class="topic-item" style="cursor:default"><span class="evidence-dot ev-documented"></span><span>documented</span></div>
        <div class="topic-item" style="cursor:default"><span class="evidence-dot ev-tested"></span><span>tested</span></div>
        <div class="topic-item" style="cursor:default"><span class="evidence-dot ev-production"></span><span>production</span></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sprints</div>
      <div id="sprints-list"></div>
    </div>
  </aside>

  <!-- Main: Filter + Claims list -->
  <main class="main" id="main-content" aria-label="Wheat workspace">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="claims-header">
      <span>ID</span><span>TYPE</span><span>CONTENT</span><span style="text-align:end">EVIDENCE</span>
      <span style="margin-inline-start:auto" class="total" id="visible-count"></span>
    </div>
    <div class="claims-list" id="claims-list"></div>
  </main>

  <!-- Detail pane -->
  <div class="detail" id="detail">
    <div class="detail-empty" id="detail-empty-text">Select a claim to view details</div>
  </div>

  <!-- Compilation panel -->
  <div class="compilation-panel" id="compilation-panel"></div>

  <!-- Statusbar -->
  <div class="statusbar">
    <span id="compiler-version"></span>
    <span>hash: <span class="hash" id="claims-hash">—</span></span>
    <span id="warning-count"></span>
    <div style="flex:1"></div>
    <div id="coverage-mini" class="coverage-mini"></div>
  </div>
</div>

<script>
// ── i18n passthrough ──
const t = (s, v) => v ? s.replace(/\{(\w+)\}/g, (_, k) => v[k] ?? k) : s;
const _dtf = new Intl.DateTimeFormat(undefined, { dateStyle: 'medium', timeStyle: 'short' });

// ── State ──
let state = { claims: [], compilation: null, sprints: [], activeSprint: null, meta: null };
let selectedClaim = null;
let activeFilter = { topic: null, type: null, status: null };

// ── SSE with exponential backoff ──
let es;
let retryCount = 0;
function showBanner(count) {
  const b = document.getElementById('reconnectBanner');
  if (count > 5) {
    b.innerHTML = t('Connection lost.') + ' <button onclick="retryCount=0;connectSSE()">' + t('Retry now') + '</button>';
  } else if (count > 1) {
    b.textContent = t('Reconnecting (attempt {count})...', { count });
  } else {
    b.textContent = t('Reconnecting...');
  }
  b.classList.add('visible');
}
function hideBanner() {
  const b = document.getElementById('reconnectBanner');
  b.classList.remove('visible');
}
function connectSSE() {
  es = new EventSource('/events');
  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        state = msg.data;
        render();
        const ls = document.getElementById('live-status');
        if (ls) ls.textContent = t('Updated: {count} claims loaded', { count: state.claims.length });
      }
    } catch { /* ignore parse errors */ }
  };
  es.onopen = () => {
    retryCount = 0;
    hideBanner();
    document.getElementById('connection-dot').classList.remove('disconnected');
  };
  es.onerror = () => {
    es.close();
    document.getElementById('connection-dot').classList.add('disconnected');
    const delay = Math.min(30000, 1000 * Math.pow(2, retryCount)) + Math.random() * 1000;
    retryCount++;
    showBanner(retryCount);
    setTimeout(connectSSE, delay);
  };
}

// ── API ──
async function recompile() {
  const btn = document.querySelector('.btn-refresh');
  btn.textContent = '...';
  try {
    const res = await fetch('/api/compile', { method: 'POST' });
    state = await res.json();
    render();
  } catch {}
  btn.textContent = t('compile');
}

// ── Render ──
function render() {
  renderToolbar();
  renderTopics();
  renderSprints();
  renderFilters();
  renderClaims();
  renderCompilation();
  renderStatusbar();
  if (selectedClaim) {
    const claim = state.claims.find(c => c.id === selectedClaim);
    if (claim) renderDetail(claim);
  }
}

function renderToolbar() {
  const q = state.meta?.question || t('No sprint loaded');
  document.getElementById('sprint-question').textContent = q;
  const phase = state.meta?.phase || '—';
  document.getElementById('phase-badge').textContent = phase;
  const status = state.compilation?.status || 'unknown';
  const badge = document.getElementById('status-badge');
  badge.textContent = status;
  badge.className = 'toolbar-badge ' + (status === 'ready' ? 'badge-ready' : 'badge-blocked');
  const active = state.claims.filter(c => c.status === 'active').length;
  document.getElementById('claim-count').textContent = t('{active}/{total} claims', { active, total: state.claims.length });
}

function renderTopics() {
  const coverage = state.compilation?.coverage || {};
  const topics = Object.entries(coverage).sort((a, b) => b[1].claims - a[1].claims);
  const el = document.getElementById('topics-list');
  el.innerHTML = topics.map(([name, cov]) => {
    const active = activeFilter.topic === name ? ' active' : '';
    return `<div class="topic-item${active}" onclick="filterTopic('${name}')">
      <span class="evidence-dot ev-${cov.max_evidence}"></span>
      <span>${name}</span>
      <span class="count">${cov.claims}</span>
    </div>`;
  }).join('');
}

function renderSprints() {
  const el = document.getElementById('sprints-list');
  if (!state.sprints.length) {
    el.innerHTML = '<div style="padding:6px 10px;color:var(--fg3);font-size:11px">' + t('No sprints detected') + '</div>';
    return;
  }
  el.innerHTML = state.sprints.map(s => {
    const isActive = s.status === 'active';
    return `<div class="topic-item${isActive ? ' active' : ''}" style="cursor:default">
      <span class="evidence-dot" style="background:${isActive ? 'var(--green)' : 'var(--fg3)'}"></span>
      <span>${s.name || 'unnamed'}</span>
      <span class="count">${s.phase || '?'}</span>
    </div>`;
  }).join('');
}

function renderFilters() {
  const types = ['constraint', 'factual', 'estimate', 'risk', 'recommendation', 'feedback'];
  const statuses = ['active', 'superseded', 'conflicted'];
  const el = document.getElementById('filter-bar');
  el.innerHTML = [
    ...types.map(t => {
      const active = activeFilter.type === t ? ' active' : '';
      return `<button class="filter-chip${active}" onclick="filterType('${t}')">${t}</button>`;
    }),
    '<span style="width:1px;height:16px;background:var(--border)"></span>',
    ...statuses.map(s => {
      const active = activeFilter.status === s ? ' active' : '';
      return `<button class="filter-chip${active}" onclick="filterStatus('${s}')">${s}</button>`;
    })
  ].join('');
}

function renderClaims() {
  let claims = state.claims;
  if (activeFilter.topic) claims = claims.filter(c => c.topic === activeFilter.topic);
  if (activeFilter.type) claims = claims.filter(c => c.type === activeFilter.type);
  if (activeFilter.status) claims = claims.filter(c => c.status === activeFilter.status);

  document.getElementById('visible-count').textContent = t('{count} shown', { count: claims.length });

  const el = document.getElementById('claims-list');
  el.innerHTML = claims.map(c => {
    const isActive = selectedClaim === c.id ? ' active' : '';
    const isConflicted = c.status === 'conflicted' ? ' conflicted' : '';
    const isSuperseded = c.status === 'superseded' ? ' superseded' : '';
    return `<div class="claim-row${isActive}${isConflicted}${isSuperseded}" onclick="selectClaim('${c.id}')">
      <span class="claim-id">${c.id}</span>
      <span class="claim-type-badge type-${c.type}">${c.type}</span>
      <span class="claim-content">${esc(c.content)}</span>
      <span class="claim-evidence">${c.evidence}</span>
    </div>`;
  }).join('');
}

function renderDetail(claim) {
  const el = document.getElementById('detail');
  const conflicts = claim.conflicts_with || [];
  const tags = claim.tags || [];
  const resolvedBy = claim.resolved_by;
  const source = claim.source || {};

  el.innerHTML = `
    <div class="detail-header">
      <div class="detail-id">${claim.id}</div>
      <span class="claim-type-badge type-${claim.type}" style="font-size:12px">${claim.type}</span>
      &nbsp;<span style="color:var(--fg3);font-size:12px">${claim.topic}</span>
      <div class="detail-meta">
        <span class="detail-tag">${claim.evidence}</span>
        <span class="detail-tag">${claim.status}</span>
        <span class="detail-tag">${claim.phase_added}</span>
        ${tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <div class="detail-section-title">${t('Content')}</div>
        <div class="detail-content">${esc(claim.content)}</div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">${t('Source')}</div>
        <div class="detail-field"><span class="detail-field-label">${t('origin')}</span><span class="detail-field-value">${source.origin || '—'}</span></div>
        <div class="detail-field"><span class="detail-field-label">${t('artifact')}</span><span class="detail-field-value">${source.artifact || '—'}</span></div>
        ${source.witnessed_claim ? `<div class="detail-field"><span class="detail-field-label">${t('witnesses')}</span><span class="related-claim" onclick="selectClaim('${source.witnessed_claim}')">${source.witnessed_claim}</span></div>` : ''}
        ${source.challenged_claim ? `<div class="detail-field"><span class="detail-field-label">${t('challenges')}</span><span class="related-claim" onclick="selectClaim('${source.challenged_claim}')">${source.challenged_claim}</span></div>` : ''}
      </div>
      ${conflicts.length ? `<div class="detail-section">
        <div class="detail-section-title">${t('Conflicts with')}</div>
        ${conflicts.map(id => `<span class="related-claim" onclick="selectClaim('${id}')">${id}</span>`).join(' ')}
      </div>` : ''}
      ${resolvedBy ? `<div class="detail-section">
        <div class="detail-section-title">${t('Resolved by')}</div>
        <span class="related-claim" onclick="selectClaim('${resolvedBy}')">${resolvedBy}</span>
      </div>` : ''}
      <div class="detail-section">
        <div class="detail-section-title">${t('Timestamp')}</div>
        <div class="detail-content" style="font-size:11px;color:var(--fg3)">${claim.timestamp || '—'}</div>
      </div>
    </div>
  `;
}

function renderStatusbar() {
  const comp = state.compilation;
  document.getElementById('claims-hash').textContent = comp?.claims_hash || '—';
  document.getElementById('compiler-version').textContent = comp ? t('wheat-compiler v{ver}', { ver: comp.compiler_version }) : '';
  const warnings = comp?.warnings || [];
  document.getElementById('warning-count').textContent = warnings.length ? t('{count} warnings', { count: warnings.length }) : '';

  // Coverage mini bars
  const coverage = comp?.coverage || {};
  const el = document.getElementById('coverage-mini');
  const evColors = { stated: 'var(--fg3)', web: 'var(--blue)', documented: 'var(--cyan)', tested: 'var(--green)', production: 'var(--accent)' };
  el.innerHTML = Object.entries(coverage).map(([name, cov]) => {
    const pct = Math.min(100, (cov.claims / 8) * 100);
    const color = evColors[cov.max_evidence] || 'var(--fg3)';
    return `<div title="${name}: ${cov.claims} claims (${cov.max_evidence})" class="coverage-bar"><div class="coverage-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }).join('');
}

// ── Interaction ──
function selectClaim(id) {
  selectedClaim = id;
  const claim = state.claims.find(c => c.id === id);
  if (claim) renderDetail(claim);
  renderClaims();
}

function filterTopic(topic) {
  activeFilter.topic = activeFilter.topic === topic ? null : topic;
  render();
}
function filterType(type) {
  activeFilter.type = activeFilter.type === type ? null : type;
  render();
}
function filterStatus(status) {
  activeFilter.status = activeFilter.status === status ? null : status;
  render();
}

// ── Mobile panel switching ──
function switchMobilePanel(panel) {
  const sidebar = document.querySelector('.sidebar');
  const main = document.querySelector('.main');
  const detail = document.getElementById('detail');
  const tabs = document.querySelectorAll('.mobile-tab');

  sidebar.classList.remove('mobile-visible');
  main.classList.remove('mobile-hidden');
  detail.classList.remove('mobile-visible');

  tabs.forEach(t => t.classList.toggle('active', t.dataset.panel === panel));

  if (panel === 'topics') {
    sidebar.classList.add('mobile-visible');
    main.classList.add('mobile-hidden');
  } else if (panel === 'detail') {
    detail.classList.add('mobile-visible');
    main.classList.add('mobile-hidden');
  }
}

// ── Compilation panel ──
function renderCompilation() {
  const el = document.getElementById('compilation-panel');
  const comp = state.compilation;
  if (!comp) {
    el.innerHTML = '<div style="color:var(--fg3)">' + t('No compilation data') + '</div>';
    return;
  }
  const warnings = comp.warnings || [];
  const conflicts = comp.conflict_graph || [];
  let html = '';
  html += '<div class="comp-row"><span class="comp-label">' + t('Status') + '</span><span class="comp-value" style="color:' + (comp.status === 'ready' ? 'var(--green)' : 'var(--red)') + '">' + (comp.status || t('unknown')) + '</span></div>';
  html += '<div class="comp-row"><span class="comp-label">' + t('Compiled') + '</span><span class="comp-value">' + (comp.compiled_at ? _dtf.format(new Date(comp.compiled_at)) : '--') + '</span></div>';
  html += '<div class="comp-row"><span class="comp-label">' + t('Claims') + '</span><span class="comp-value">' + (comp.claim_count || state.claims.length) + '</span></div>';
  if (warnings.length > 0) {
    html += '<div style="margin-top:6px;font-size:10px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">' + t('Warnings ({count})', { count: warnings.length }) + '</div>';
    for (const w of warnings.slice(0, 5)) {
      html += '<div class="comp-warning">' + esc(typeof w === 'string' ? w : w.message || JSON.stringify(w)) + '</div>';
    }
    if (warnings.length > 5) html += '<div style="color:var(--fg3);font-size:10px;margin-top:2px">...and ' + (warnings.length - 5) + ' more</div>';
  }
  if (conflicts.length > 0) {
    html += '<div style="margin-top:6px;font-size:10px;color:var(--fg3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">' + t('Conflicts ({count})', { count: conflicts.length }) + '</div>';
    for (const c of conflicts.slice(0, 5)) {
      const ids = Array.isArray(c) ? c.join(' vs ') : (c.claims || []).join(' vs ');
      html += '<div class="comp-conflict">' + esc(ids) + '</div>';
    }
  }
  el.innerHTML = html;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Keyboard shortcuts ──
// ── Panel switching ──
const panels = ['.sidebar', '.main', '.detail'];
let activePanel = 1;
function switchPanel(dir) {
  activePanel = (activePanel + dir + panels.length) % panels.length;
  const el = document.querySelector(panels[activePanel]);
  if (el) { el.focus(); el.setAttribute('tabindex', '-1'); }
}
function closeDetail() {
  activeFilter = { topic: null, type: null, status: null };
  selectedClaim = null;
  document.getElementById('detail').innerHTML = '<div class="detail-empty">' + t('Select a claim to view details') + '</div>';
  render();
}

document.addEventListener('keydown', (e) => {
  if (e.key === '[' && !e.target.matches('input,textarea')) { e.preventDefault(); switchPanel(-1); }
  if (e.key === ']' && !e.target.matches('input,textarea')) { e.preventDefault(); switchPanel(1); }

  const claims = getFilteredClaims();
  if (!claims.length) return;
  const idx = claims.findIndex(c => c.id === selectedClaim);

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    const next = Math.min(idx + 1, claims.length - 1);
    selectClaim(claims[next].id);
    scrollClaimIntoView(claims[next].id);
  }
  if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    const prev = Math.max(idx - 1, 0);
    selectClaim(claims[prev].id);
    scrollClaimIntoView(claims[prev].id);
  }
  if (e.key === 'Escape') {
    closeDetail();
  }
});

function getFilteredClaims() {
  let claims = state.claims;
  if (activeFilter.topic) claims = claims.filter(c => c.topic === activeFilter.topic);
  if (activeFilter.type) claims = claims.filter(c => c.type === activeFilter.type);
  if (activeFilter.status) claims = claims.filter(c => c.status === activeFilter.status);
  return claims;
}

function scrollClaimIntoView(id) {
  const rows = document.querySelectorAll('.claim-row');
  for (const row of rows) {
    if (row.querySelector('.claim-id')?.textContent === id) {
      row.scrollIntoView({ block: 'nearest' });
      break;
    }
  }
}

// ── Init ──
connectSSE();
</script>
</body>
